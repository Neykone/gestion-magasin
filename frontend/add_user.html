<script>
    // Afficher le champ fournisseur uniquement si le rôle fournisseur est sélectionné
    document.getElementById('role').addEventListener('change', function() {
        let fournisseurGroup = document.getElementById('fournisseur_group');
        if (this.value === 'fournisseur') {
            fournisseurGroup.style.display = 'block';
        } else {
            fournisseurGroup.style.display = 'none';
            // Optionnel : vider la sélection quand on cache
            document.getElementById('fournisseur_id').value = '';
        }
    });
</script>
