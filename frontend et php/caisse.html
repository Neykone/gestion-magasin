<script>
    // Variables globales
    let panier = [];

    // Fonction pour ajouter au panier
    function ajouterAuPanier(id) {
        let produitCard = document.querySelector(`.produit-card[data-id="${id}"]`);
        let nom = produitCard.dataset.nom;
        let prix = parseFloat(produitCard.dataset.prix);
        let stock = parseInt(produitCard.dataset.stock);

        // Vérifier le stock
        let articleExistant = panier.find(item => item.id === id);
        let quantiteDansPanier = articleExistant ? articleExistant.quantite : 0;

        if (quantiteDansPanier >= stock) {
            alert('Stock insuffisant!');
            return;
        }

        if (articleExistant) {
            articleExistant.quantite++;
        } else {
            panier.push({
                id: id,
                nom: nom,
                prix: prix,
                quantite: 1,
                stock: stock
            });
        }

        mettreAJourPanier();
    }

    // Fonction pour mettre à jour l'affichage du panier
    function mettreAJourPanier() {
        let tbody = document.getElementById('panierBody');
        tbody.innerHTML = '';

        let sousTotal = 0;

        panier.forEach((item, index) => {
            let totalLigne = item.prix * item.quantite;
            sousTotal += totalLigne;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.nom}</td>
                <td>${item.prix.toFixed(2)} DH</td>
                <td>
                    <input type="number" min="1" max="${item.stock}" value="${item.quantite}"
                           onchange="changerQuantite(${index}, this.value)" style="width: 50px;">
                </td>
                <td>${totalLigne.toFixed(2)} DH</td>
                <td><button onclick="retirerDuPanier(${index})" style="color: red; border: none; background: none;"><i class="fas fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
        });

        let tva = sousTotal * 0.20;
        let total = sousTotal + tva;

        document.getElementById('sousTotal').textContent = sousTotal.toFixed(2) + ' DH';
        document.getElementById('tva').textContent = tva.toFixed(2) + ' DH';
        document.getElementById('totalFinal').textContent = total.toFixed(2) + ' DH';
    }

    // Fonction pour changer la quantité
    function changerQuantite(index, nouvelleQuantite) {
        nouvelleQuantite = parseInt(nouvelleQuantite);
        if (nouvelleQuantite < 1) nouvelleQuantite = 1;
        if (nouvelleQuantite > panier[index].stock) {
            alert('Stock insuffisant!');
            nouvelleQuantite = panier[index].stock;
        }
        panier[index].quantite = nouvelleQuantite;
        mettreAJourPanier();
    }

    // Fonction pour retirer du panier
    function retirerDuPanier(index) {
        panier.splice(index, 1);
        mettreAJourPanier();
    }

    // Fonction pour vider le panier
    function viderPanier() {
        if (confirm('Vider le panier ?')) {
            panier = [];
            mettreAJourPanier();
        }
    }

    // Fonction pour annuler la vente
    function annulerVente() {
        if (panier.length > 0) {
            if (confirm('Annuler la vente en cours ?')) {
                panier = [];
                mettreAJourPanier();
            }
        }
    }

    // Fonction pour encaisser
    function encaisser() {
        if (panier.length === 0) {
            alert('Panier vide!');
            return;
        }

        let total = parseFloat(document.getElementById('totalFinal').textContent);
        let message = `Total à payer: ${total.toFixed(2)} DH\n\nChoisir le mode de paiement:`;
        let modePaiement = prompt(message + '\n1: Espèces\n2: Carte\n3: Virement');

        if (modePaiement === '1' || modePaiement === '2' || modePaiement === '3') {
            let modes = ['', 'Espèces', 'Carte', 'Virement'];
            alert(`Vente enregistrée! Paiement par ${modes[modePaiement]}`);
            panier = [];
            mettreAJourPanier();
        }
    }

    // Recherche de produits
    document.getElementById('searchProduit').addEventListener('keyup', function() {
        let searchValue = this.value.toLowerCase();
        let produits = document.querySelectorAll('.produit-card');

        produits.forEach(produit => {
            let nom = produit.dataset.nom.toLowerCase();
            if (nom.includes(searchValue)) {
                produit.style.display = 'block';
            } else {
                produit.style.display = 'none';
            }
        });
    });

    // Filtres par catégorie
    document.querySelectorAll('.filtre-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('actif'));
            this.classList.add('actif');
            // Ici tu peux ajouter le filtre par catégorie
        });
    });
</script>
