<script>
    // Fonction pour afficher/masquer les détails
    function toggleDetails(venteId) {
        let detailsDiv = document.getElementById('details-' + venteId);
        if (detailsDiv.style.display === 'none') {
            detailsDiv.style.display = 'block';
        } else {
            detailsDiv.style.display = 'none';
        }
    }

    // Fonction pour imprimer le ticket (simulation)
    function imprimerTicket(id) {
        alert('Impression du ticket #' + id + ' (simulation)');
    }

    // Recherche en temps réel
    document.getElementById('searchVente').addEventListener('keyup', function() {
        let searchValue = this.value.toLowerCase();
        let rows = document.querySelectorAll('#historiqueTable tbody tr');

        rows.forEach(row => {
            let text = row.textContent.toLowerCase();
            if (text.includes(searchValue)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });

    // Filtre par statut
    document.getElementById('filterStatut').addEventListener('change', function() {
        let statut = this.value;
        let rows = document.querySelectorAll('#historiqueTable tbody tr');

        rows.forEach(row => {
            if (statut === 'all') {
                row.style.display = '';
            } else {
                let rowStatut = row.querySelector('td:nth-child(7) .badge').textContent.toLowerCase().trim();
                if (rowStatut.includes(statut)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        });
    });

    // Filtre par période (simulation)
    document.getElementById('filterPeriode').addEventListener('change', function() {
        let periode = this.value;
        // Ici tu pourrais implémenter un vrai filtre par date
        console.log('Filtre par période:', periode);
    });
</script>
